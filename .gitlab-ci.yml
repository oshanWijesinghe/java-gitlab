stages:
  - test
  - build
  - dockerize
  - push
  - ansible-deploy

sonarqube-check:
  stage: test
  image: sonarsource/sonar-scanner-cli:latest
  script:
    - sonar-scanner -Dsonar.projectKey=$SONAR_PROJECT_KEY -Dsonar.sources=. -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.token=$SONAR_TOKEN
  only:
    - main

maven-build:
  stage: build
  image: maven:3.8-openjdk-11
  script:
    - cd spring-boot-app
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - spring-boot-app/target/*.jar  

docker-build:
  stage: dockerize
  image: docker:latest
  services:
    - docker:dind
  script:
    - cd spring-boot-app
   
    - ls -la target/ 
    - docker build -t my-app:latest .
    - docker save my-app:latest > ../my-app.tar
  artifacts:
    paths:›
      - my-app.tar

docker-push:
  stage: push
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker login -u $DOCKER_USER -p $DOCKER_PASSWORD
    - docker load < my-app.tar
    - docker tag my-app:latest $DOCKER_USER/python_minikubw:latest
    - docker push $DOCKER_USER/python_minikubw:latest


ansible-deploy:
  stage: ansible-deploy
  image: alpine:latest 
  #pre requirements to ssh
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$EC2_SSH_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan $CONTROL_NODE_IP >> ~/.ssh/known_hosts
  
  script:
   - |
     ssh ubuntu@$CONTROL_NODE_IP "
       cd ansible-project &&
       ansible-playbook \
         -i inventory.ini \
         site.yml \
         -e 'docker_username=$DOCKER_USERNAME'
     "